<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Time tracking dashboard</title>
  <script defer src="./script.js"></script>
</head>
<body>

  <div class="dashboard-container">

      <div class="dashboard__profile-contianer">
        <div class="card-profile">
            <img src="./images/image-jeremy.png" alt="">
            <div class="card-profile__text">
                <p class="card-profile-for">Report for</p>
                <h1 class="card-profile__name">Jeremy Robson</h1>
            </div>
        </div>
        <div class="switch-info-btns">
            <button class="info__btns" id="dailyBtn">Daily</button>
            <button class="info__btns" id="weeklyBtn">Weekly</button>
            <button class="info__btns" id="monthlyBtn">Monthly</button>
        </div>
      </div>

      <div class="dashboard__card card-work">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Work</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous" id="workPrevious"></span>
        </div>
        </div>
      </div>

      <div class="dashboard__card card-play">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Play</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous"></span>
        </div>
        </div>
      </div>

      <div class="dashboard__card card-study">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Study</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous"></span>
        </div>
        </div>
      </div>

      <div class="dashboard__card card-exercise">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Exercise</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous"></span>
        </div>
        </div>
      </div>

      <div class="dashboard__card card-self-care">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Social</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous"></span>
        </div>
        </div>
      </div>

      <div class="dashboard__card card-social">
        <div class="dashboard__card-info">
        <div class="dashboard__card--text--sub">            
            <h3 class="dashboard__card--title">Self Care</h3>
            <img class="dashboard__card--ellipsis" src="./images/icon-ellipsis.svg" alt="">
        </div>
        <div class="dashboard__card--text-main">
          <p class="dashboard__card--hours"></p>
          <span class="dashboard__card--previous"></span>
        </div>
        </div>
      </div>

  </div>
  
</body>
</html>
